services:
  - type: web
    name: faridashop
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run production
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: FaridaShop
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: faridashop-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: faridashop-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: faridashop-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: faridashop-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: faridashop-db
          property: password

databases:
  - name: faridashop-db
    plan: free
    databaseName: faridashop
    user: faridashop
